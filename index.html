<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a4f8b">
<title>STEALTH SPORTS PREMIUM</title>
<style>
/* ─── BASE & LIGHT THEME ─── */
:root {
  --bg-main: #f4f7f6;
  --bg-white: #ffffff;
  --primary-blue: #135482;
  --secondary-blue: #1b6ca8;
  --accent-red: #e8000d;
  --text-dark: #222222;
  --text-muted: #666666;
  --border-light: #e0e4e8;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
body { background-color: var(--bg-main); color: var(--text-dark); overflow-x: hidden; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }

/* ─── LOGIN SCREEN ─── */
#loginScreen { position: fixed; inset: 0; z-index: 9999; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.login-box { background: var(--bg-white); padding: 40px 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; border-top: 5px solid var(--accent-red); }
.login-logo { width: 120px; height: 120px; margin-bottom: 20px; object-fit: contain; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
.login-box h2 { color: var(--primary-blue); font-size: 18px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
.login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border-light); border-radius: 4px; text-align: center; font-size: 16px; letter-spacing: 2px; }
.login-box button { width: 100%; padding: 12px; background: var(--primary-blue); color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
.login-box button:hover { background: var(--secondary-blue); }
#loginErr { color: var(--accent-red); font-size: 12px; margin-top: 10px; min-height: 15px; }

/* ─── APP CONTAINER ─── */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* ─── TOP HEADER (BLUE) ─── */
.top-header { background-color: var(--primary-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
.brand-area { display: flex; align-items: center; gap: 15px; }
.brand-logo { height: 40px; border-radius: 8px; }
.brand-title { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
.header-controls { display: flex; align-items: center; gap: 15px; font-size: 13px; }
.lang-btn { background: transparent; border: 1px solid rgba(255,255,255,0.5); color: white; padding: 3px 8px; border-radius: 3px; cursor: pointer; font-weight: bold; }
.lang-btn:hover { background: rgba(255,255,255,0.1); }
.clock-area { display: flex; flex-direction: column; align-items: flex-end; }
#liveClock { font-weight: bold; font-size: 14px; }
#tzSelect { background: transparent; color: rgba(255,255,255,0.8); border: none; font-size: 11px; outline: none; cursor: pointer; margin-top: 2px; }
#tzSelect option { color: black; }

/* ─── SEARCH BAR ─── */
.search-bar { background-color: var(--secondary-blue); padding: 10px 20px; display: flex; justify-content: center; }
.search-input-wrapper { position: relative; width: 100%; max-width: 600px; display: flex; }
.search-input-wrapper input { width: 100%; padding: 10px 15px; border: none; border-radius: 4px 0 0 4px; font-size: 14px; outline: none; }
.search-btn { background: var(--accent-red); color: white; border: none; padding: 0 20px; border-radius: 0 4px 4px 0; font-weight: bold; cursor: pointer; }

/* ─── MAIN NAV (SPORTS ICONS) ─── */
.main-nav { background: var(--primary-blue); display: flex; overflow-x: auto; padding: 0 10px; scrollbar-width: none; border-bottom: 3px solid var(--accent-red); }
.main-nav::-webkit-scrollbar { display: none; }
.nav-tab { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.7); padding: 10px 15px; cursor: pointer; transition: 0.2s; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.nav-tab:hover { color: white; background: rgba(255,255,255,0.05); }
.nav-tab.active { color: white; background: var(--secondary-blue); border-bottom: 3px solid white; margin-bottom: -3px; }
.nav-icon { font-size: 20px; margin-bottom: 4px; }

/* ─── DATE SLIDER ─── */
.date-slider { background: var(--secondary-blue); display: flex; overflow-x: auto; padding: 10px; gap: 5px; scrollbar-width: none; }
.date-slider::-webkit-scrollbar { display: none; }
.date-card { flex: 0 0 auto; width: 65px; background: rgba(255,255,255,0.1); border-radius: 4px; color: white; text-align: center; padding: 8px 0; cursor: pointer; border: 1px solid transparent; }
.date-card:hover { background: rgba(255,255,255,0.2); }
.date-card.active { background: white; color: var(--primary-blue); border-color: white; font-weight: bold; }
.date-day { font-size: 11px; text-transform: uppercase; margin-bottom: 2px; }
.date-num { font-size: 16px; font-weight: bold; }

/* ─── MAIN CONTENT WRAPPER ─── */
.content-wrapper { max-width: 1000px; margin: 0 auto; width: 100%; padding: 20px; }

/* ─── BILLBOARD ANNOUNCEMENT ─── */
.billboard { background: var(--bg-white); border: 1px solid var(--border-light); border-radius: 8px; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; display: none; }
.bb-left h3 { font-size: 22px; color: var(--text-dark); margin-bottom: 5px; }
.bb-left p { font-size: 14px; color: var(--text-muted); }
.bb-right a { background: var(--secondary-blue); color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; transition: 0.2s; display: inline-block; }
.bb-right a:hover { background: var(--primary-blue); }

/* ─── SECONDARY MENUS ─── */
.sub-menus { background: var(--bg-white); border: 1px solid var(--border-light); border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
.menu-row { display: flex; border-bottom: 1px solid var(--border-light); }
.menu-item { padding: 12px 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; text-transform: uppercase; }
.menu-item.active { color: var(--primary-blue); border-bottom: 2px solid var(--primary-blue); margin-bottom: -1px; }

.action-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #fafafa; border-bottom: 1px solid var(--border-light); }
.action-left { font-size: 14px; font-weight: 600; color: var(--primary-blue); display: flex; align-items: center; gap: 8px; }
.action-left span { cursor: pointer; }

.filter-row { display: flex; gap: 15px; padding: 12px 20px; background: var(--bg-white); overflow-x: auto; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.f-btn { background: #eee; border: 1px solid #ddd; padding: 6px 15px; border-radius: 4px; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; white-space: nowrap; }
.f-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
#regionSelect { background: #eee; border: 1px solid #ddd; padding: 6px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; color: var(--text-dark); outline: none; cursor: pointer; }

/* ─── SCHEDULE LIST ─── */
.schedule-container { background: var(--bg-white); border: 1px solid var(--border-light); border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
.s-row { display: flex; align-items: center; border-bottom: 1px solid #eee; padding: 12px 15px; transition: background 0.15s; }
.s-row:hover { background: #f9f9f9; }
.s-row:last-child { border-bottom: none; }

.time-col { width: 85px; flex-shrink: 0; text-align: center; }
.time-box { background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; padding: 6px 4px; font-size: 12px; font-weight: 700; color: #444; display: inline-block; width: 100%; }
.time-box.live { background: var(--accent-red); border-color: var(--accent-red); color: white; animation: pulse 2s infinite; }

.match-col { flex-grow: 1; padding: 0 15px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
.match-title { font-size: 14px; font-weight: 600; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 8px;}
.match-title img { height: 18px; width: 18px; object-fit: contain; }
.league-name { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-top: 4px; text-transform: uppercase; }

.chan-col { width: auto; flex-shrink: 0; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
.stealth-badge { background: var(--accent-red); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; white-space: nowrap; box-shadow: 0 2px 4px rgba(232,0,13,0.3); }
.prov-badge { border: 1px solid #ddd; color: var(--text-muted); padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; white-space: nowrap; }

.status-msg { padding: 40px; text-align: center; font-size: 15px; color: var(--text-muted); }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #eee; border-top-color: var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

/* Responsive adjustments */
@media(max-width: 600px) {
  .brand-title { font-size: 16px; }
  .billboard { flex-direction: column; text-align: center; gap: 15px; }
  .s-row { flex-wrap: wrap; padding: 10px; }
  .time-col { width: 75px; }
  .match-col { padding: 0 10px; width: calc(100% - 75px); }
  .chan-col { width: 100%; flex-direction: row; justify-content: flex-start; padding-top: 8px; margin-top: 8px; border-top: 1px dashed #eee; padding-left: 85px;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <img src="logo.png" alt="Stealth Sports" class="login-logo" onerror="this.style.display='none'">
    <h2 id="txt-login-head">STEALTH SPORTS PREMIUM</h2>
    <input type="password" id="accessCode" placeholder="••••••••" autocomplete="off">
    <button onclick="doLogin()" id="txt-login-btn">ACCESS GUIDE</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- APP WRAPPER -->
<div id="app">

  <!-- TOP HEADER -->
  <div class="top-header">
    <div class="brand-area">
      <img src="logo.png" alt="Logo" class="brand-logo" onerror="this.style.display='none'">
      <div class="brand-title">STEALTH SPORTS</div>
    </div>
    <div class="header-controls">
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">FR</button>
      <div class="clock-area">
        <div id="liveClock">00:00:00</div>
        <select id="tzSelect" onchange="renderSchedule()"></select>
      </div>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-bar">
    <div class="search-input-wrapper">
      <input type="text" id="searchBox" placeholder="Search events, teams, channels...">
      <button class="search-btn">🔍</button>
    </div>
  </div>

  <!-- MAIN NAV (ICONS) -->
  <div class="main-nav" id="mainNav"></div>

  <!-- DATE SLIDER -->
  <div class="date-slider" id="dateSlider"></div>

  <div class="content-wrapper">
    
    <!-- BILLBOARD -->
    <div class="billboard" id="billboard">
      <div class="bb-left">
        <h3 id="bbMsg"></h3>
        <p id="txt-announce-sub">Important Update</p>
      </div>
      <div class="bb-right">
        <a href="#" target="_blank" id="bbLink" style="display:none;"></a>
      </div>
    </div>

    <!-- SECONDARY MENUS -->
    <div class="sub-menus">
      <div class="menu-row">
        <div class="menu-item active" id="txt-guide">Guide</div>
        <div class="menu-item" id="txt-leagues">Leagues</div>
        <div class="menu-item" id="txt-teams">Teams</div>
        <div class="menu-item" id="txt-upcoming">Upcoming</div>
      </div>
      
      <div class="action-row">
        <div class="action-left">
          <span id="txt-myleagues">All events for My Leagues</span>
          <span onclick="alert('Manage leagues feature coming soon.')">⚙️</span>
        </div>
      </div>

      <div class="filter-row">
        <button class="f-btn active" onclick="setSubFilter('ALL')" id="f-all">All</button>
        <button class="f-btn" onclick="setSubFilter('MY')" id="f-my">My Sports</button>
        <select id="regionSelect" onchange="renderSchedule()">
          <option value="ALL">Us, Ca, World</option>
          <option value="CA">Canada</option>
          <option value="US">USA</option>
          <option value="UK">UK</option>
          <option value="FR">France</option>
          <option value="AU">Australia</option>
          <option value="NZ">New Zealand</option>
        </select>
      </div>
    </div>

    <!-- SCHEDULE LIST -->
    <div class="schedule-container" id="scheduleContent">
      <div class="status-msg"><div class="spinner"></div><br><br><span id="txt-loading">Loading live data...</span></div>
    </div>

  </div>
</div>

<script>
// ============================================================================
// CONFIGURATION
// ============================================================================
const PASS = "stealth1949a";
const SHEET_ID = "1Ghnu7b647kksvXeKn8xNtBBa4CjYfZXwlfc-cdnCQS8";
const TSDB_KEY = "385560";

const i18n = {
  en: {
    logHead: "STEALTH SPORTS PREMIUM", logBtn: "ACCESS GUIDE", err: "Invalid Code",
    all: "All Sports", my: "My Sports", amfb: "Am. Football", base: "Baseball",
    bball: "Basketball", hock: "Ice Hockey", foot: "Football", ten: "Tennis", golf: "Golf", oth: "Other",
    guide: "Guide", leagues: "Leagues", teams: "Teams", upcoming: "Upcoming",
    myLgs: "All events for My Leagues", allFil: "All", myFil: "My Sports",
    search: "Search events, teams, channels...", loading: "Loading live data...",
    noEvents: "No matches found for the selected day.", watch: "WATCH ON:", prov: "PROVIDER:",
    today: "Today"
  },
  fr: {
    logHead: "STEALTH SPORTS PREMIUM", logBtn: "ACCÉDER AU GUIDE", err: "Code Invalide",
    all: "Tous les Sports", my: "Mes Sports", amfb: "F. Américain", base: "Baseball",
    bball: "Basket", hock: "Hockey", foot: "Foot", ten: "Tennis", golf: "Golf", oth: "Autre",
    guide: "Guide", leagues: "Ligues", teams: "Équipes", upcoming: "À Venir",
    myLgs: "Tous les événements de Mes Ligues", allFil: "Tous", myFil: "Mes Sports",
    search: "Rechercher événements, équipes...", loading: "Chargement des données...",
    noEvents: "Aucun match trouvé pour ce jour.", watch: "DIFFUSÉ SUR:", prov: "FOURNISSEUR:",
    today: "Auj."
  }
};

const CATEGORIES =[
  { id: "ALL",   icon: "📺", en: "All Sports", fr: "Tous les Sports", match: [] },
  { id: "MY",    icon: "⭐", en: "My Sports", fr: "Mes Sports", match:[] },
  { id: "AMFB",  icon: "🏈", en: "Am. Football", fr: "F. Américain", match: ["NFL"] },
  { id: "BASE",  icon: "⚾", en: "Baseball", fr: "Baseball", match: ["MLB"] },
  { id: "BBALL", icon: "🏀", en: "Basketball", fr: "Basket", match:["NBA","NCAAB"] },
  { id: "HOCK",  icon: "🏒", en: "Ice Hockey", fr: "Hockey", match: ["NHL"] },
  { id: "FOOT",  icon: "⚽", en: "Football", fr: "Foot", match:["MLS","English Premier League","Spanish La Liga","Italian Serie A","French Ligue 1","German Bundesliga","UEFA Champions League"] },
  { id: "TEN",   icon: "🎾", en: "Tennis", fr: "Tennis", match: ["ATP World Tour"] },
  { id: "GOLF",  icon: "⛳", en: "Golf", fr: "Golf", match: ["PGA Tour"] },
  { id: "OTH",   icon: "➕", en: "Other", fr: "Autre", match:["Formula 1", "PPV UFC", "PPV BOXING", "PPV EVENTS"] }
];

let state = {
  lang: localStorage.getItem('stealth_lang') || 'en',
  auth: sessionStorage.getItem('stealth_auth') === '1',
  cat: 'ALL',
  sub: 'ALL',
  search: '',
  date: new Date().toISOString().split('T')[0],
  rawSheet:[],
  rawTsdb:[]
};

// ============================================================================
// INIT & UI
// ============================================================================
function init() {
  updateUI();
  populateTimezones();
  startClock();
  buildNav();
  buildDateSlider();
  
  if (state.auth) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    fetchAnnouncements();
    fetchData();
  }

  document.getElementById('searchBox').addEventListener('input', e => {
    state.search = e.target.value.toLowerCase();
    renderSchedule();
  });
}

function doLogin() {
  if(document.getElementById('accessCode').value === PASS) {
    sessionStorage.setItem('stealth_auth', '1');
    state.auth = true;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    fetchAnnouncements();
    fetchData();
  } else {
    document.getElementById('loginErr').textContent = i18n[state.lang].err;
  }
}

function toggleLang() {
  state.lang = state.lang === 'en' ? 'fr' : 'en';
  localStorage.setItem('stealth_lang', state.lang);
  updateUI();
  buildNav();
  buildDateSlider();
  fetchAnnouncements(); // Refresh translation
  renderSchedule();
}

function updateUI() {
  const d = i18n[state.lang];
  document.getElementById('langBtn').textContent = state.lang === 'en' ? 'FR' : 'EN';
  document.getElementById('txt-login-head').textContent = d.logHead;
  document.getElementById('txt-login-btn').textContent = d.logBtn;
  document.getElementById('txt-guide').textContent = d.guide;
  document.getElementById('txt-leagues').textContent = d.leagues;
  document.getElementById('txt-teams').textContent = d.teams;
  document.getElementById('txt-upcoming').textContent = d.upcoming;
  document.getElementById('txt-myleagues').textContent = d.myLgs;
  document.getElementById('f-all').textContent = d.allFil;
  document.getElementById('f-my').textContent = d.myFil;
  document.getElementById('searchBox').placeholder = d.search;
}

function startClock() {
  setInterval(() => {
    const tz = document.getElementById('tzSelect').value;
    document.getElementById('liveClock').textContent = new Intl.DateTimeFormat('en-US', { timeStyle: 'medium', timeZone: tz }).format(new Date());
  }, 1000);
}

function populateTimezones() {
  const sel = document.getElementById('tzSelect');
  const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const zones =[localTz, "America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "Europe/London", "Europe/Paris", "Australia/Sydney"];
  let unique = [...new Set(zones)];
  sel.innerHTML = unique.map(z => `<option value="${z}">${z.split('/')[1].replace('_',' ')}</option>`).join('');
}

// ============================================================================
// NAVIGATION
// ============================================================================
function buildNav() {
  const nav = document.getElementById('mainNav');
  nav.innerHTML = CATEGORIES.map(c => `
    <div class="nav-tab ${state.cat === c.id ? 'active' : ''}" onclick="setCat('${c.id}')">
      <span class="nav-icon">${c.icon}</span>
      ${c[state.lang]}
    </div>`).join('');
}

function setCat(id) { state.cat = id; buildNav(); renderSchedule(); }
function setSubFilter(id) { 
  state.sub = id; 
  document.getElementById('f-all').className = `f-btn ${id==='ALL'?'active':''}`;
  document.getElementById('f-my').className = `f-btn ${id==='MY'?'active':''}`;
  renderSchedule();
}

function buildDateSlider() {
  const slider = document.getElementById('dateSlider');
  let html = '';
  let today = new Date();
  
  for(let i=0; i<7; i++) {
    let d = new Date(today);
    d.setDate(today.getDate() + i);
    let dateStr = d.toISOString().split('T')[0];
    let dayName = i === 0 ? i18n[state.lang].today : d.toLocaleDateString(state.lang, {weekday: 'short'});
    html += `
      <div class="date-card ${state.date === dateStr ? 'active' : ''}" onclick="setDate('${dateStr}')">
        <div class="date-day">${dayName}</div>
        <div class="date-num">${d.getDate()}</div>
      </div>`;
  }
  slider.innerHTML = html;
}

function setDate(d) { state.date = d; buildDateSlider(); fetchData(); }

// ============================================================================
// DATA FETCHING & TIME LOGIC
// ============================================================================
function fetchAnnouncements() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=ANNOUNCEMENTS`;
  fetch(url).then(r=>r.text()).then(txt => {
    try {
      const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}')+1));
      const row = json.table.rows[0];
      if (row) {
        const msgEn = row.c[0]?.v || '';
        const url = row.c[1]?.v || '';
        const btnEn = row.c[2]?.v || 'LINK';
        const msgFr = row.c[3]?.v || msgEn;
        const btnFr = row.c[4]?.v || btnEn;

        if (msgEn) {
          document.getElementById('billboard').style.display = 'flex';
          document.getElementById('bbMsg').textContent = state.lang === 'fr' ? msgFr : msgEn;
          if (url) {
            const link = document.getElementById('bbLink');
            link.style.display = 'inline-block';
            link.href = url;
            link.textContent = state.lang === 'fr' ? btnFr : btnEn;
          }
        }
      }
    } catch(e) {}
  });
}

function fetchData() {
  document.getElementById('scheduleContent').innerHTML = `<div class="status-msg"><div class="spinner"></div><br><br><span>${i18n[state.lang].loading}</span></div>`;
  Promise.all([fetchSheet(), fetchTSDB()]).then(() => renderSchedule());
}

function fetchSheet() {
  return new Promise(resolve => {
    if (state.date !== new Date().toISOString().split('T')[0]) {
      state.rawSheet =[]; return resolve(); // Only show sheets for "today"
    }
    const tabs =["NHL","MLB","NBA","NFL","MLS","ESPN+","TSN+","SN+","PARAMOUNT","PEACOCK","FLSP","BTN+","VICTORY+","DAZN","PPV UFC","PPV EVENTS"];
    let count = 0; state.rawSheet =[];
    tabs.forEach(tab => {
      fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`)
      .then(r=>r.text()).then(txt => {
        try {
          const j = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}')+1));
          j.table.rows.forEach(r => {
            if(r.c && r.c[0] && r.c[0].v !== 'Channel #') {
              state.rawSheet.push({ league: tab, channel: r.c[0].v, title: r.c[1].v, timeRaw: r.c[3]?.v?.replace(/^'/, ''), region: getReg(r.c[0].v) });
            }
          });
        } catch(e){}
      }).finally(() => { count++; if(count === tabs.length) resolve(); });
    });
  });
}

function fetchTSDB() {
  return new Promise(resolve => {
    const leagues =["NHL","MLB","NBA","NFL","MLS","English Premier League","Spanish La Liga","UEFA Champions League","Formula 1","ATP World Tour","PGA Tour"];
    let count = 0; state.rawTsdb =[];
    leagues.forEach(l => {
      fetch(`https://www.thesportsdb.com/api/v1/json/${TSDB_KEY}/eventsday.php?d=${state.date}&l=${encodeURIComponent(l)}`)
      .then(r=>r.json()).then(data => {
        if(data.events) {
          data.events.forEach(e => {
            state.rawTsdb.push({
              league: l, away: e.strAwayTeam, home: e.strHomeTeam, aBadge: e.strAwayTeamBadge, hBadge: e.strHomeTeamBadge,
              aScore: e.intAwayScore, hScore: e.intHomeScore, status: e.strStatus,
              utcDate: e.dateEvent, utcTime: e.strTime // Raw UTC from API
            });
          });
        }
      }).finally(() => { count++; if(count === leagues.length) resolve(); });
    });
  });
}

// ─── TIMEZONE & REGION UTILS ───
function getReg(ch) {
  const c = ch.toUpperCase();
  if(c.includes('CA ') || c.includes('TSN') || c.includes('SN+')) return 'CA';
  if(c.includes('UK ')) return 'UK';
  if(c.includes('AU ')) return 'AU';
  if(c.includes('FR ')) return 'FR';
  if(c.includes('NZ ')) return 'NZ';
  return 'US';
}

function getLocalTimeFromUTC(utcDate, utcTime, targetTz) {
  if(!utcTime) return { str: "TBD", ms: 9999999999999 };
  try {
    let d = new Date(`${utcDate}T${utcTime}Z`);
    let str = new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit', timeZone: targetTz }).format(d);
    return { str: str, ms: d.getTime() };
  } catch(e) { return { str: utcTime, ms: 9999999999999 }; }
}

function getLocalTimeFromET(timeRaw, targetTz) {
  if(!timeRaw || timeRaw === 'N/A') return { str: "TBD", ms: 9999999999999 };
  try {
    let m = timeRaw.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if(!m) return { str: timeRaw, ms: 9999999999999 };
    let h = parseInt(m[1]), min = parseInt(m[2]), ap = m[3].toUpperCase();
    if(ap === 'PM' && h < 12) h += 12;
    if(ap === 'AM' && h === 12) h = 0;
    
    // Assume today, America/New_York
    let now = new Date();
    let etDateStr = new Intl.DateTimeFormat('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'America/New_York'}).format(now);
    let pts = etDateStr.split('/'); // MM/DD/YYYY
    let iso = `${pts[2]}-${pts[0]}-${pts[1]}T${('0'+h).slice(-2)}:${('0'+min).slice(-2)}:00-04:00`; // Using EDT offset approx
    
    let d = new Date(iso);
    let str = new Intl.DateTimeFormat('en-US', { hour: 'numeric', minute: '2-digit', timeZone: targetTz }).format(d);
    return { str: str, ms: d.getTime() };
  } catch(e) { return { str: timeRaw, ms: 9999999999999 }; }
}

// ============================================================================
// RENDER SCHEDULE
// ============================================================================
function renderSchedule() {
  const container = document.getElementById('scheduleContent');
  const d = i18n[state.lang];
  const targetTz = document.getElementById('tzSelect').value;
  const nowMs = new Date().getTime();
  
  let merged =[];
  
  // 1. Process TSDB
  state.rawTsdb.forEach(te => {
    let timeData = getLocalTimeFromUTC(te.utcDate, te.utcTime, targetTz);
    
    // Filter out games that finished > 4 hours ago (4 * 60 * 60 * 1000 = 14400000)
    if (te.status === 'Match Finished' || te.status === 'FT') {
        if (nowMs - timeData.ms > 14400000) return; 
    }

    let matchChan = null, matchReg = 'US';
    // Fuzzy match with sheet
    state.rawSheet.forEach(se => {
      let t = se.title.toLowerCase();
      if(te.away && te.home && (t.includes(te.away.toLowerCase().split(' ').pop()) || t.includes(te.home.toLowerCase().split(' ').pop()))) {
        matchChan = se.channel; matchReg = se.region; se.used = true;
      }
    });
    
    merged.push({
      isTsdb: true, league: te.league, title: `${te.away} at ${te.home}`,
      aBadge: te.aBadge, hBadge: te.hBadge, aScore: te.aScore, hScore: te.hScore,
      status: te.status, timeStr: timeData.str, ms: timeData.ms,
      channel: matchChan, region: matchReg
    });
  });
  
  // 2. Add remaining Sheet data
  state.rawSheet.forEach(se => {
    if(!se.used) {
      let timeData = getLocalTimeFromET(se.timeRaw, targetTz);
      merged.push({
        isTsdb: false, league: se.league, title: se.title,
        timeStr: timeData.str, ms: timeData.ms, channel: se.channel, region: se.region
      });
    }
  });
  
  // 3. Filter
  let regFil = document.getElementById('regionSelect').value;
  let filtered = merged.filter(ev => {
    if(regFil !== 'ALL' && ev.region !== regFil) return false;
    if(state.cat !== 'ALL') {
      let c = CATEGORIES.find(x => x.id === state.cat);
      if(c && !c.match.includes(ev.league)) return false;
    }
    if(state.search && !(ev.title.toLowerCase().includes(state.search) || (ev.channel||'').toLowerCase().includes(state.search))) return false;
    return true;
  });
  
  filtered.sort((a,b) => a.ms - b.ms);
  
  if(filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><h2>${d.noEvents}</h2></div>`;
    return;
  }
  
  // 4. Render
  let html = '';
  let curLg = '';
  
  filtered.forEach(ev => {
    if(ev.league !== curLg) {
      curLg = ev.league;
      html += `<div class="league-header"><div class="league-name">${ev.league}</div><div class="league-line"></div></div>`;
    }
    
    let isLive = ev.status && !['Not Started','Match Finished','FT','NS'].includes(ev.status);
    let timeBoxClass = isLive ? 'time-box live' : 'time-box';
    let timeBoxText = isLive ? 'LIVE' : ev.timeStr;
    
    let badgeHtml = '';
    if(ev.isTsdb && ev.aBadge) {
      badgeHtml = `<img src="${ev.aBadge}"><img src="${ev.hBadge}">`;
    }
    
    let scoreHtml = '';
    if(ev.isTsdb && (isLive || ev.status === 'Match Finished' || ev.status === 'FT')) {
      scoreHtml = `<span style="color:var(--primary-blue); font-weight:900; font-size:16px; margin-left:10px;">${ev.aScore} - ${ev.hScore}</span>`;
    }
    
    let chanHtml = ev.channel 
      ? `<div class="stealth-badge">${d.watch} ${ev.channel}</div>` 
      : `<div class="prov-badge">${d.prov} ${ev.league}</div>`;
      
    html += `
    <div class="s-row">
      <div class="time-col">
        <div class="${timeBoxClass}">${timeBoxText}</div>
      </div>
      <div class="match-col">
        <div class="match-title">${badgeHtml} ${ev.title} ${scoreHtml}</div>
        <div class="league-name">${ev.league}</div>
      </div>
      <div class="chan-col">
        ${chanHtml}
      </div>
    </div>`;
  });
  
  container.innerHTML = html;
}

window.onload = init;
</script>
