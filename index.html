function isFuzzyMatch(sheetTitle, tsAway, tsHome) {
  if (!sheetTitle || !tsAway || !tsHome) return false;
  let s = sheetTitle.toLowerCase();
  let a = tsAway.toLowerCase().split(' ').filter(w => w.length > 2);
  let h = tsHome.toLowerCase().split(' ').filter(w => w.length > 2);
  // Must match at least one significant word from BOTH teams
  let aM = a.some(w => s.includes(w));
  let hM = h.some(w => s.includes(w));
  return aM && hM;
}

// ============================================================================
// TIMEZONE ENGINE
// ============================================================================
function populateTZ() {
  const sel = document.getElementById('tzSelect');
  const zones =[
    {v: Intl.DateTimeFormat().resolvedOptions().timeZone, l: "Local Device Time"},
    {v: "America/New_York", l: "Montreal / New York (ET)"},
    {v: "America/Chicago", l: "Chicago (CT)"},
    {v: "America/Denver", l: "Calgary / Denver (MT)"},
    {v: "America/Phoenix", l: "Phoenix"},
    {v: "America/Los_Angeles", l: "Vancouver / LA (PT)"},
    {v: "Europe/London", l: "London (UK)"},
    {v: "Europe/Paris", l: "Paris (FR)"},
    {v: "Australia/Sydney", l: "Sydney (AU)"},
    {v: "Pacific/Auckland", l: "New Zealand (NZ)"}
  ];
  let seen = new Set(); let html = '';
  zones.forEach(z => {
    if(!seen.has(z.v)){ seen.add(z.v); html += `<option value="${z.v}" ${z.v===state.tz?'selected':''}>${z.l}</option>`; }
  });
  sel.innerHTML = html;
}

function startClock() {
  setInterval(() => { document.getElementById('liveClock').textContent = new Intl.DateTimeFormat('en-US', { timeStyle: 'medium', timeZone: state.tz }).format(new Date()); }, 1000);
}

function changeTz() {
  state.tz = document.getElementById('tzSelect').value;
  localStorage.setItem('stealth_tz', state.tz);
  calcLocalDate(); buildDates(); fetchData();
}

function calcLocalDate() {
  const parts = new Intl.DateTimeFormat('en-US', { year:'numeric', month:'2-digit', day:'2-digit', timeZone: state.tz }).formatToParts(new Date());
  state.dateStr = `${parts.find(p=>p.type==='year').value}-${parts.find(p=>p.type==='month').value}-${parts.find(p=>p.type==='day').value}`;
  state.dateObj = new Date(`${state.dateStr}T12:00:00`);
}

function parseUtcToLocal(utcDate, utcTime) {
  if(!utcTime) return { str:"TBD", ms:9999999999999, isTargetDay: true };
  try {
    let d = new Date(`${utcDate}T${utcTime}Z`);
    let str = new Intl.DateTimeFormat('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short', timeZone: state.tz }).format(d);
    
    // Check if this MS falls within the selected dateStr in the selected TZ
    const p = new Intl.DateTimeFormat('en-US', { year:'numeric', month:'2-digit', day:'2-digit', timeZone: state.tz }).formatToParts(d);
    let isTargetDay = `${p.find(x=>x.type==='year').value}-${p.find(x=>x.type==='month').value}-${p.find(x=>x.type==='day').value}` === state.dateStr;
    
    return { str: str, ms: d.getTime(), isTargetDay: isTargetDay };
  } catch(e) { return { str:utcTime, ms:9999999999999, isTargetDay:true }; }
}

function parseEtToLocal(timeRaw) {
  if(!timeRaw || timeRaw==='N/A') return { str:"TBD", ms:9999999999999 };
  try {
    let m = timeRaw.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if(!m) return { str:timeRaw, ms:9999999999999 };
    let h = parseInt(m[1]), min = parseInt(m[2]), ap = m[3].toUpperCase();
    if(ap === 'PM' && h < 12) h += 12; if(ap === 'AM' && h === 12) h = 0;
    
    // Assume ET is UTC-4 for schedule simplicity
    let iso = `${state.dateStr}T${('0'+h).slice(-2)}:${('0'+min).slice(-2)}:00-04:00`; 
    let d = new Date(iso);
    let str = new Intl.DateTimeFormat('en-US', { hour:'numeric', minute:'2-digit', timeZoneName:'short', timeZone: state.tz }).format(d);
    return { str: str, ms: d.getTime() };
  } catch(e) { return { str:timeRaw, ms:9999999999999 }; }
}

function buildNav() {
  const nav = document.getElementById('mainNav');
  let html = NAV_CATS.map(c => `<div class="nav-item ${state.cat===c.id?'active':''}" onclick="setCat('${c.id}')">${c[state.lang]}</div>`).join('');
  html += `<select class="nav-select" onchange="setCat(this.value)"><option value="" disabled selected hidden>${state.lang==='en'?'OTHER ▾':'AUTRE ▾'}</option>`;
  OTH_CATS.forEach(c => { html += `<option value="${c.id}">${c[state.lang]}</option>`; });
  html += `</select>`;
  nav.innerHTML = html;
}

function setCat(id) { state.cat = id; buildNav(); render(); }
function setView(v) { 
  state.view = v; 
  document.getElementById('tab-guide').className = `sm-tab ${v==='guide'?'active':''}`;
  document.getElementById('tab-results').className = `sm-tab ${v==='results'?'active':''}`;

}
function setSub(id) {

  document.getElementById('f-my').className = `f-btn ${id==='MY'?'active':''}`;

}

function buildDates() {
  const slider = document.getElementById('dateSlider');
  let html = '';
  let base = new Date(); // Real today
  
  for(let i=0; i<7; i++) {
    let d = new Date(base); d.setDate(base.getDate() + i);
    let dStr = d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
    let dayName = i===0 ? i18n[state.lang].today : d.toLocaleDateString(state.lang, {weekday:'short'});
    html += `
      <div class="date-box ${state.dateStr === dStr ? 'active' : ''}" onclick="pickDate('${dStr}')">
        <div class="d-day">${dayName}</div>
        <div class="d-num">${d.getDate()}</div>
      </div>`;
  }
  slider.innerHTML = html;
}

function pickDate(dStr) {
  state.dateStr = dStr; state.dateObj = new Date(`${dStr}T12:00:00`);
  buildDates(); fetchData();
}

  localStorage.setItem('stealth_favs', JSON.stringify(state.favTeams));

// DATA FETCHING
// ============================================================================
function fetchAnnouncements() {
  fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=ANNOUNCEMENTS`)
  .then(r=>r.text()).then(txt => {
    try {
      const j = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}')+1));
      const row = j.table.rows[0];
      if (row) {
        const msgEn = row.c[0]?.v || ''; const lnk = row.c[1]?.v || ''; const btnEn = row.c[2]?.v || 'LINK';
        const msgFr = row.c[3]?.v || msgEn; const btnFr = row.c[4]?.v || btnEn;
        if (msgEn) {
          document.getElementById('billboard').style.display = 'flex';
          document.getElementById('bbMsg').textContent = state.lang === 'fr' ? msgFr : msgEn;
          if (lnk) {
            const a = document.getElementById('bbLink');
            a.style.display = 'inline-block'; a.href = lnk; a.textContent = state.lang === 'fr' ? btnFr : btnEn;
          }
        }
      }
    } catch(e) {}
  });
}

function fetchData() {
  document.getElementById('scheduleContent').innerHTML = `<div class="status-msg"><div class="spinner"></div><br><br><span>${i18n[state.lang].loading}</span></div>`;
  Promise.all([fetchSheet(), fetchTSDB()]).then(() => render());
}

function fetchSheet() {
  return new Promise(resolve => {
    const parts = new Intl.DateTimeFormat('en-US', { year:'numeric', month:'2-digit', day:'2-digit', timeZone: state.tz }).formatToParts(new Date());
    let realToday = `${parts.find(p=>p.type==='year').value}-${parts.find(p=>p.type==='month').value}-${parts.find(p=>p.type==='day').value}`;
    if (state.dateStr !== realToday) { state.rawSh =[]; return resolve(); }
    
    const tabs =["NHL","MLB","NBA","NFL","MLS","ESPN+","TSN+","SN+","PARAMOUNT","PEACOCK","FLSP","BTN+","VICTORY+","DAZN","PPV UFC","PPV BOXING","PPV EVENTS","PPV NETFLIX","CBC PPV"];
    let count = 0; state.rawSh =[];
    tabs.forEach(tab => {
      fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`)
      .then(r=>r.text()).then(txt => {
        try {
          const j = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}')+1));
          j.table.rows.forEach(r => {
            if(r.c && r.c[0] && r.c[0].v !== 'Channel #') {
              state.rawSh.push({ lg: tab, ch: r.c[0].v, ti: r.c[1].v, rawTm: r.c[3]?.v?.replace(/^'/, ''), reg: getReg(r.c[0].v) });
            }
          });
        } catch(e){}
      }).finally(() => { count++; if(count === tabs.length) resolve(); });
    });
  });
}

function fetchTSDB() {
  return new Promise(resolve => {
    // Fetch target date AND target date+1 to capture UTC day-bleed
    let d2 = new Date(state.dateObj); d2.setDate(d2.getDate() + 1);
    let str2 = d2.getFullYear() + '-' + ('0'+(d2.getMonth()+1)).slice(-2) + '-' + ('0'+d2.getDate()).slice(-2);
    let dates =[state.dateStr, str2];
    
    const lgs =["NHL","MLB","NBA","NFL","MLS","English Premier League","Spanish La Liga","UEFA Champions League","Formula 1","ATP World Tour","PGA Tour"];
    let count = 0; state.rawTs =[];
    
    lgs.forEach(l => {
      dates.forEach(d => {
        fetch(`https://www.thesportsdb.com/api/v1/json/${TSDB_KEY}/eventsday.php?d=${d}&l=${encodeURIComponent(l)}`)
        .then(r=>r.json()).then(data => {
          if(data.events) {
            data.events.forEach(e => {
              state.rawTs.push({ lg: l, a: e.strAwayTeam, h: e.strHomeTeam, aB: e.strAwayTeamBadge, hB: e.strHomeTeamBadge, aS: e.intAwayScore, hS: e.intHomeScore, stat: e.strStatus, uD: e.dateEvent, uT: e.strTime });
            });
          }
        }).finally(() => { count++; if(count === lgs.length * 2) resolve(); });
      });
    });
  });
}

function getReg(ch) {
  const c = ch.toUpperCase();
  if(c.includes('CA ') || c.includes('TSN') || c.includes('SN+') || c.includes('CBC')) return 'CA';
  if(c.includes('UK ')) return 'UK';
  if(c.includes('AU ')) return 'AU';
  if(c.includes('FR ')) return 'FR';
  if(c.includes('NZ ')) return 'NZ';
  return 'US';
}

// ============================================================================
// RENDER & MATCHING
// ============================================================================
function render() {
  const c = document.getElementById('scheduleContent');
  const d = i18n[state.lang];
  
  let merged =[];
  let seenTs = new Set();
  
  // 1. Process TSDB
  state.rawTs.forEach(te => {
    let uid = te.lg + te.a + te.h + te.uD;
    if(seenTs.has(uid)) return;
    seenTs.add(uid);
    
    let tData = parseUtcToLocal(te.uD, te.uT);
    if(!tData.isTargetDay) return; // Discard if it doesn't fall on UI selected day
    
    let isFin = te.stat === 'Match Finished' || te.stat === 'FT';
    if(state.view === 'guide' && isFin) return; 
    if(state.view === 'results' && !isFin) return; 
    
    let mCh = null, mReg = 'US';
    state.rawSh.forEach(se => {
      // Bounding
      let valid = false;
      if(te.lg==='NHL' &&['NHL','ESPN+','SN+','TSN+','FLSP'].includes(se.lg)) valid=true;
      if(te.lg==='MLB' && ['MLB','ESPN+'].includes(se.lg)) valid=true;
      if(te.lg==='NBA' &&['NBA','ESPN+','TSN+'].includes(se.lg)) valid=true;
      if(te.lg==='NFL' &&['NFL','ESPN+','TSN+','DAZN'].includes(se.lg)) valid=true;
      if(te.lg==='MLS' && ['MLS','ESPN+','TSN+'].includes(se.lg)) valid=true;
      
      if(valid && isFuzzyMatch(se.ti, te.a, te.h)) { mCh = se.ch; mReg = se.reg; se.used = true; }
    });
    
    merged.push({ ts: true, lg: te.lg, a: te.a, h: te.h, aB: te.aB, hB: te.hB, aS: te.aS, hS: te.hS, stat: te.stat, tStr: tData.str, ms: tData.ms, ch: mCh, reg: mReg, fin: isFin });
  });
  
  // 2. Process Sheets
  state.rawSh.forEach(se => {
    if(se.used) return;
    if(state.view === 'results') return; // Assume sheets are upcoming/live
    let tData = parseEtToLocal(se.rawTm);
    merged.push({ ts: false, lg: se.lg, ti: se.ti, tStr: tData.str, ms: tData.ms, ch: se.ch, reg: se.reg, fin: false });
  });
  
  // 3. Filter
  let rFil = document.getElementById('regionSelect').value;
  let fil = merged.filter(ev => {
    if(rFil !== 'ALL' && ev.reg !== rFil) return false;
    if(state.sub === 'MY' && !state.myLgs.includes(ev.lg)) return false;
    if(state.cat !== 'ALL') {
      let cDef = NAV_CATS.find(x=>x.id===state.cat) || OTH_CATS.find(x=>x.id===state.cat);
      if(cDef && !cDef.ls.includes(ev.lg)) return false;
    }
    if(state.search) {
      let txt = (ev.ti || (ev.a+" "+ev.h)).toLowerCase() + " " + (ev.ch||"").toLowerCase();
      if(!txt.includes(state.search)) return false;
    }
    return true;
  });
  
  // Sort by Time, then Favs
  fil.sort((x,y) => x.ms - y.ms);
  fil.sort((x,y) => {
    let xF = state.favTeams.includes(x.a) || state.favTeams.includes(x.h) ? -1 : 1;
    let yF = state.favTeams.includes(y.a) || state.favTeams.includes(y.h) ? -1 : 1;
    return xF - yF;
  });
  
  if(fil.length === 0) {
    c.innerHTML = `<div class="status-msg">${d.noEvents}</div>`;
    return;
  }
  
  // 4. HTML Build
  let html = ''; let curLg = '';
  fil.forEach(ev => {
    if(ev.lg !== curLg) {
      curLg = ev.lg;
      html += `<div class="league-group"><div class="league-hdr">${ev.lg}</div>`;
    }
    
    let isLive = ev.stat && !['Not Started','NS'].includes(ev.stat) && !ev.fin;
    let tCls = isLive ? 'time-box live' : 'time-box';
    let tTxt = isLive ? 'LIVE' : ev.tStr;
    
    let matchHtml = '';
    if(ev.ts) {
      let aS = ev.aS !== null ? ev.aS : '0';
      let hS = ev.hS !== null ? ev.hS : '0';
      let sc = (isLive || ev.fin) ? `<div class="score-box"><div class="score-val">${aS} - ${hS}</div></div>` : `<div class="score-box"><div class="score-vs">${d.at}</div></div>`;
      let aL = ev.aB ? `<img src="${ev.aB}" class="t-logo">` : '';
      let hL = ev.hB ? `<img src="${ev.hB}" class="t-logo">` : '';
      let isFvA = state.favTeams.includes(ev.a) ? 'fav' : '';
      let isFvH = state.favTeams.includes(ev.h) ? 'fav' : '';
      
      matchHtml = `
        <div class="team-wrap away"><span class="star-btn ${isFvA}" onclick="toggleFav('${ev.a}')">★</span><span class="t-name">${ev.a}</span> ${aL}</div>
        ${sc}
        <div class="team-wrap">${hL} <span class="t-name">${ev.h}</span><span class="star-btn ${isFvH}" onclick="toggleFav('${ev.h}')">★</span></div>`;
    } else {
      let hili = state.search ? ev.ti.replace(new RegExp('('+state.search+')','gi'),'<span style="background:var(--stealth-badge);color:white;">$1</span>') : ev.ti;
      matchHtml = `<div class="t-name" style="width:100%;">${hili}</div>`;
    }
    
    let chanHtml = '';
    if(ev.fin && ev.ts) {
      chanHtml = `<a href="https://www.google.com/search?q=box+score+${encodeURIComponent(ev.a+' vs '+ev.h)}" target="_blank" class="box-score-btn">📊 ${d.box}</a>`;
    } else if(ev.ch) {
      chanHtml = `<div class="badge-stealth">${d.watch} ${ev.ch}</div>`;
    } else if(ev.ts) {
      let def = BRD_MAP[ev.lg] || "Check Local Listings";
      chanHtml = `<div class="badge-prov">${d.prov} ${def}</div>`;
    }
    
    html += `
      <div class="card">
        <div class="c-time"><div class="${tCls}">${tTxt}</div>${isLive?`<div class="time-sub">${ev.stat}</div>`:''}</div>
        <div class="c-match"><div class="match-row">${matchHtml}</div></div>
        <div class="c-chans">${chanHtml}</div>
      </div>`;
  });
  
  c.innerHTML = html + '</div>'; 
}

setInterval(() => { if(state.auth) fetchData(); }, 300000);
window.onload = init;
