<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Stealth Sports</title>
<link rel="manifest" href="manifest.json">
<style>
/* ─── VARIABLES & BASE ─── */
:root {
  --bg: #0a0a0a; --bg-card: #141414; --bg-hover: #1a1a1a;
  --text-main: #ffffff; --text-muted: #888888;
  --steel: #4a90d9; --sky: #87ceeb; --red: #e8000d;
  --border: #222; --accent: #2a2a2a;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
button { cursor: pointer; border: none; background: none; color: inherit; }
a { text-decoration: none; color: inherit; }

/* ─── LOGIN SCREEN ─── */
#loginScreen { position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at top, #0d1a2e 0%, #0a0a0a 70%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.logo-box { position: relative; width: 100px; height: 100px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
.logo-play { font-size: 90px; background: linear-gradient(135deg, #ff1a1a, #e8000d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 15px rgba(232,0,13,0.5)); margin-left: 8px;}
.logo-ninja { position: absolute; font-size: 45px; filter: drop-shadow(0 0 10px rgba(74,144,217,0.8)); }
.brand-title { font-size: 28px; font-weight: 900; letter-spacing: 2px; background: linear-gradient(135deg, #fff, var(--sky), var(--steel)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
.login-panel { background: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 340px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
.login-panel input { width: 100%; padding: 14px; margin-bottom: 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: #fff; text-align: center; font-size: 16px; letter-spacing: 2px; }
.login-panel input:focus { outline: none; border-color: var(--steel); }
.login-panel button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--steel), #2a6db5); color: #fff; font-weight: 700; border-radius: 8px; letter-spacing: 1px; text-transform: uppercase; }
#loginErr { color: var(--red); font-size: 12px; text-align: center; min-height: 15px; margin-top: 10px; }

/* ─── APP LAYOUT ─── */
#app { display: none; flex-direction: column; height: 100vh; }
.top-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--bg); border-bottom: 1px solid var(--border); }
.brand-mini { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 16px; color: #fff; }
.brand-mini .play { color: var(--red); font-size: 14px; }
.top-controls { display: flex; gap: 12px; align-items: center; font-size: 12px; }
.lang-toggle { background: var(--accent); padding: 4px 8px; border-radius: 4px; font-weight: 600; }
.clock-tz { display: flex; flex-direction: column; align-items: flex-end; }
.clock { font-weight: 700; color: var(--sky); }
.tz-select { background: transparent; color: var(--text-muted); border: none; font-size: 10px; outline: none; cursor: pointer; }

/* ─── PRIMARY NAV ─── */
.nav-scroll { display: flex; overflow-x: auto; background: var(--bg-card); border-bottom: 1px solid var(--border); scrollbar-width: none; }
.nav-scroll::-webkit-scrollbar { display: none; }
.nav-item { padding: 14px 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); white-space: nowrap; border-bottom: 2px solid transparent; text-transform: uppercase; }
.nav-item.active { color: var(--text-main); border-bottom-color: var(--steel); }

/* ─── BILLBOARD (ANNOUNCEMENTS) ─── */
.billboard { margin: 20px; padding: 20px; background: linear-gradient(135deg, #112233 0%, var(--bg-card) 100%); border-left: 4px solid var(--steel); border-radius: 8px; display: none; }
.bb-title { font-size: 12px; color: var(--sky); font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
.bb-msg { font-size: 14px; line-height: 1.4; margin-bottom: 12px; }
.bb-link { display: inline-block; padding: 6px 12px; background: var(--steel); color: #fff; font-size: 12px; font-weight: 600; border-radius: 4px; }

/* ─── SECONDARY NAV & FILTERS ─── */
.sec-nav { display: flex; gap: 20px; padding: 0 20px; margin-bottom: 15px; font-size: 14px; font-weight: 600; color: var(--text-muted); }
.sec-item.active { color: var(--steel); }
.filters-row { display: flex; justify-content: space-between; align-items: center; padding: 0 20px 15px; border-bottom: 1px solid var(--border); }
.myleagues { font-size: 12px; color: var(--text-main); display: flex; align-items: center; gap: 6px; }
.edit-icon { color: var(--muted); cursor: pointer; }
.filter-dropdowns select { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; font-size: 12px; outline: none; }

/* ─── DATE SLIDER ─── */
.date-slider { display: flex; overflow-x: auto; padding: 15px 20px; gap: 10px; border-bottom: 1px solid var(--border); scrollbar-width: none; }
.date-slider::-webkit-scrollbar { display: none; }
.date-box { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 60px; padding: 8px 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); cursor: pointer; transition: 0.2s; }
.date-box.active { background: var(--steel); color: #fff; border-color: var(--steel); }
.d-day { font-size: 10px; text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
.d-date { font-size: 16px; font-weight: 800; }

/* ─── SEARCH BAR ─── */
.search-container { padding: 15px 20px 0; }
.search-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); padding: 12px 15px; border-radius: 8px; color: #fff; font-size: 14px; }
.search-input:focus { border-color: var(--steel); outline: none; }

/* ─── CONTENT / SCHEDULE CARDS ─── */
.content-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }
.league-header { display: flex; align-items: center; gap: 10px; margin: 25px 0 15px; }
.league-logo { width: 24px; height: 24px; object-fit: contain; }
.league-name { font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-main); }
.league-line { flex: 1; height: 1px; background: var(--border); }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px; transition: 0.2s; }
.card:hover { border-color: #333; background: var(--bg-hover); }
.card-top { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
.time-live { color: var(--red); font-weight: 800; display: flex; align-items: center; gap: 4px; }
.time-live::before { content:''; display:inline-block; width:6px; height:6px; background:var(--red); border-radius:50%; animation: pulse 1.5s infinite; }

.matchup { display: flex; align-items: center; justify-content: space-between; }
.team { display: flex; align-items: center; gap: 12px; flex: 1; }
.team.away { justify-content: flex-end; text-align: right; }
.team-logo { width: 36px; height: 36px; object-fit: contain; }
.team-name { font-size: 15px; font-weight: 700; color: var(--text-main); }
.score-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 15px; min-width: 70px; }
.score-text { font-size: 22px; font-weight: 900; color: var(--sky); letter-spacing: 2px;}
.vs-text { font-size: 13px; font-weight: 700; color: var(--muted); }

.card-bottom { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 12px; }
.stealth-channel { background: rgba(74,144,217,0.1); border: 1px solid rgba(74,144,217,0.3); color: var(--sky); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
.provider-channel { font-size: 11px; color: var(--muted); }
.star-btn { font-size: 18px; color: var(--muted); cursor: pointer; }
.star-btn.fav { color: #f6c90e; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }

@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

/* ─── RESPONSIVE ─── */
@media (min-width: 768px) {
  .content-area { max-width: 900px; margin: 0 auto; }
  .billboard { max-width: 900px; margin: 20px auto; }
  .search-container { max-width: 900px; margin: 15px auto 0; }
  .team-logo { width: 44px; height: 44px; }
  .team-name { font-size: 18px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-box">
    <div class="logo-play">▶</div>
    <div class="logo-ninja">⚡</div>
  </div>
  <div class="brand-title">STEALTH SPORTS</div>
  <div class="login-panel">
    <h2 id="txt-access">ENTER ACCESS CODE</h2>
    <input type="password" id="accessCode" placeholder="••••••••" autocomplete="off">
    <button onclick="doLogin()" id="txt-login-btn">ACCESS SCHEDULE</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOP HEADER -->
  <div class="top-bar">
    <div class="brand-mini"><span class="play">▶</span> STEALTH</div>
    <div class="top-controls">
      <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
      <div class="clock-tz">
        <div class="clock" id="liveClock">00:00:00</div>
        <select class="tz-select" id="tzSelect" onchange="render()"></select>
      </div>
      <button onclick="doLogout()" style="margin-left:8px; color:var(--muted);">⏻</button>
    </div>
  </div>

  <!-- PRIMARY NAV -->
  <div class="nav-scroll" id="mainNav">
    <!-- Populated by JS -->
  </div>

  <!-- SEARCH -->
  <div class="search-container">
    <input type="text" id="searchBox" class="search-input" placeholder="Search teams, events, channels...">
  </div>

  <!-- BILLBOARD -->
  <div class="billboard" id="billboard">
    <div class="bb-title" id="txt-announce">📣 ANNOUNCEMENT</div>
    <div class="bb-msg" id="bbMsg"></div>
    <a href="#" target="_blank" class="bb-link" id="bbLink" style="display:none;"></a>
  </div>

  <!-- SECONDARY NAV -->
  <div style="padding-top: 15px;">
    <div class="sec-nav">
      <span class="sec-item active" id="txt-guide">Guide</span>
      <span class="sec-item" id="txt-upcoming">Upcoming</span>
    </div>
    <div class="filters-row">
      <div class="myleagues"><span id="txt-myleagues">All Events</span> <span class="edit-icon">⚙️</span></div>
      <div class="filter-dropdowns">
        <select id="regionFilter" onchange="render()">
          <option value="ALL">All Regions</option>
          <option value="CA">Canada (CA)</option>
          <option value="US">USA (US)</option>
          <option value="UK">UK (UK)</option>
          <option value="AU">Australia (AU)</option>
        </select>
      </div>
    </div>
  </div>

  <!-- DATE SLIDER -->
  <div class="date-slider" id="dateSlider">
    <!-- Populated by JS -->
  </div>

  <!-- SCHEDULE CONTENT -->
  <div class="content-area" id="scheduleContent">
    <div class="empty-state">Loading...</div>
  </div>

</div>

<script>
// ============================================================================
// CONFIGURATION & DICTIONARY
// ============================================================================
const PASS = "stealth1949a";
const SHEET_ID = "1Ghnu7b647kksvXeKn8xNtBBa4CjYfZXwlfc-cdnCQS8";
const TSDB_KEY = "385560";

// Interface Dictionary
const i18n = {
  en: {
    access: "ENTER ACCESS CODE", loginBtn: "ACCESS SCHEDULE", err: "Invalid Code",
    all: "All Sports", my: "My Sports", fball: "Football", base: "Baseball",
    bball: "Basketball", hock: "Hockey", soc: "Soccer", ten: "Tennis", golf: "Golf", oth: "Other",
    announce: "📣 ANNOUNCEMENT", guide: "Guide", upcoming: "Upcoming",
    myLgs: "All Events", watchOn: "📺 WATCH ON:", checkProv: "Check provider for channel",
    today: "Today", noEvents: "No events found for this selection."
  },
  fr: {
    access: "ENTRER LE CODE", loginBtn: "ACCÉDER AU GUIDE", err: "Code Invalide",
    all: "Tous les Sports", my: "Mes Sports", fball: "F. Américain", base: "Baseball",
    bball: "Basket", hock: "Hockey", soc: "Foot", ten: "Tennis", golf: "Golf", oth: "Autre",
    announce: "📣 ANNONCE", guide: "Guide", upcoming: "À Venir",
    myLgs: "Tous les Événements", watchOn: "📺 DIFFUSÉ SUR:", checkProv: "Vérifier le fournisseur",
    today: "Aujourd'hui", noEvents: "Aucun événement trouvé pour cette sélection."
  }
};

// Sports Categories Mapping
const CATEGORIES =[
  { id: "ALL",   en: "All Sports", fr: "Tous les Sports" },
  { id: "HOCKEY",en: "Hockey",     fr: "Hockey",     tabs: ["NHL"], tsdb: ["NHL"] },
  { id: "BASE",  en: "Baseball",   fr: "Baseball",   tabs: ["MLB"], tsdb:["MLB"] },
  { id: "BBALL", en: "Basketball", fr: "Basket",     tabs: ["NBA","NCAAB"], tsdb: ["NBA"] },
  { id: "FBALL", en: "Football",   fr: "F. Américain", tabs: ["NFL"], tsdb: ["NFL"] },
  { id: "SOCCER",en: "Soccer",     fr: "Foot",       tabs:["MLS"], tsdb:["MLS","English Premier League","Spanish La Liga","Italian Serie A","French Ligue 1","German Bundesliga","UEFA Champions League"] },
  { id: "FIGHT", en: "Combat",     fr: "Combat",     tabs:["PPV UFC","PPV BOXING","PPV EVENTS"], tsdb:[] },
  { id: "OTHER", en: "Other",      fr: "Autre",      tabs:["TSN+","SN+","ESPN+","FLSP","DAZN","BTN+","VICTORY+","PARAMOUNT","PEACOCK","PPV NETFLIX","OTHER"], tsdb: ["Formula 1","ATP World Tour","PGA Tour"] }
];

// ============================================================================
// STATE
// ============================================================================
let state = {
  lang: localStorage.getItem('stealth_lang') || 'en',
  auth: sessionStorage.getItem('stealth_auth') === '1',
  activeCat: 'ALL',
  search: '',
  region: 'ALL',
  selectedDate: getLocalDateStr(new Date()), // YYYY-MM-DD
  sheetData:[], // parsed events from Google Sheets
  tsdbData:[],  // parsed events from TSDB
  favTeams: JSON.parse(localStorage.getItem('stealth_favs') || '[]')
};

// ============================================================================
// INITIALIZATION
// ============================================================================
function init() {
  updateLangUI();
  populateTimezones();
  startClock();
  buildMainNav();
  buildDateSlider();
  
  if (state.auth) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    fetchAnnouncements();
    fetchAllData();
  }
  
  // Search binding
  document.getElementById('searchBox').addEventListener('input', (e) => {
    state.search = e.target.value.toLowerCase();
    renderSchedule();
  });
}

// ============================================================================
// AUTH & UI BASICS
// ============================================================================
function doLogin() {
  if (document.getElementById('accessCode').value === PASS) {
    sessionStorage.setItem('stealth_auth', '1');
    state.auth = true;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    fetchAnnouncements();
    fetchAllData();
  } else {
    document.getElementById('loginErr').textContent = i18n[state.lang].err;
  }
}
function doLogout() { sessionStorage.removeItem('stealth_auth'); location.reload(); }

function toggleLang() {
  state.lang = state.lang === 'en' ? 'fr' : 'en';
  localStorage.setItem('stealth_lang', state.lang);
  updateLangUI();
  buildMainNav();
  buildDateSlider();
  renderSchedule();
}

function updateLangUI() {
  const d = i18n[state.lang];
  document.getElementById('langBtn').textContent = state.lang.toUpperCase();
  document.getElementById('txt-access').textContent = d.access;
  document.getElementById('txt-login-btn').textContent = d.loginBtn;
  document.getElementById('txt-announce').textContent = d.announce;
  document.getElementById('txt-guide').textContent = d.guide;
  document.getElementById('txt-upcoming').textContent = d.upcoming;
  document.getElementById('txt-myleagues').textContent = d.myLgs;
}

function startClock() {
  setInterval(() => {
    const tz = document.getElementById('tzSelect').value;
    const now = new Date();
    const timeStr = new Intl.DateTimeFormat('en-US', { timeStyle: 'medium', timeZone: tz }).format(now);
    document.getElementById('liveClock').textContent = timeStr;
  }, 1000);
}

function populateTimezones() {
  const sel = document.getElementById('tzSelect');
  const zones =["America/New_York", "America/Chicago", "America/Denver", "America/Los_Angeles", "Europe/London", "Europe/Paris", "Australia/Sydney"];
  const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (!zones.includes(localTz)) zones.unshift(localTz);
  
  sel.innerHTML = zones.map(z => `<option value="${z}" ${z===localTz?'selected':''}>${z.split('/')[1].replace('_',' ')}</option>`).join('');
}

function getLocalDateStr(d) {
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}

// ============================================================================
// NAVIGATION & DATE SLIDER
// ============================================================================
function buildMainNav() {
  const nav = document.getElementById('mainNav');
  nav.innerHTML = CATEGORIES.map(c => 
    `<div class="nav-item ${state.activeCat === c.id ? 'active' : ''}" onclick="setCategory('${c.id}')">${c[state.lang]}</div>`
  ).join('');
}

function setCategory(id) {
  state.activeCat = id;
  buildMainNav();
  renderSchedule();
}

function buildDateSlider() {
  const slider = document.getElementById('dateSlider');
  let html = '';
  let today = new Date();
  
  for(let i=0; i<7; i++) {
    let d = new Date(today);
    d.setDate(today.getDate() + i);
    let dateStr = getLocalDateStr(d);
    let dayName = i === 0 ? i18n[state.lang].today : d.toLocaleDateString(state.lang, {weekday: 'short'});
    let dayNum = d.getDate();
    
    html += `<div class="date-box ${state.selectedDate === dateStr ? 'active' : ''}" onclick="setDate('${dateStr}')">
               <span class="d-day">${dayName}</span>
               <span class="d-date">${dayNum}</span>
             </div>`;
  }
  slider.innerHTML = html;
}

function setDate(dateStr) {
  state.selectedDate = dateStr;
  buildDateSlider();
  fetchAllData(); // Re-fetch TSDB for the new date
}

function toggleFav(team) {
  if(state.favTeams.includes(team)) {
    state.favTeams = state.favTeams.filter(t => t !== team);
  } else {
    state.favTeams.push(team);
  }
  localStorage.setItem('stealth_favs', JSON.stringify(state.favTeams));
  renderSchedule();
}

// ============================================================================
// DATA FETCHING
// ============================================================================
function fetchAnnouncements() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=ANNOUNCEMENTS`;
  fetch(url).then(r=>r.text()).then(txt => {
    try {
      const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}')+1));
      const row = json.table.rows[0];
      if (row && row.c[0] && row.c[0].v) {
        document.getElementById('billboard').style.display = 'block';
        document.getElementById('bbMsg').textContent = row.c[0].v;
        if (row.c[1] && row.c[1].v) {
          const btn = document.getElementById('bbLink');
          btn.style.display = 'inline-block';
          btn.href = row.c[1].v;
          btn.textContent = row.c[2] ? row.c[2].v : 'LINK';
        }
      }
    } catch(e) {}
  });
}

function fetchAllData() {
  document.getElementById('scheduleContent').innerHTML = '<div class="empty-state"><div class="spinner" style="border-color:#fff;border-top-color:var(--steel);width:20px;height:20px;"></div> Loading Data...</div>';
  
  Promise.all([fetchGoogleSheets(), fetchTSDB()]).then(() => {
    renderSchedule();
  });
}

// ─── GOOGLE SHEETS ───
function fetchGoogleSheets() {
  return new Promise((resolve) => {
    if (state.selectedDate !== getLocalDateStr(new Date())) {
      state.sheetData =[]; // Only show Sheet data for "Today" as it doesn't hold future days reliably yet
      return resolve();
    }
    
    // We fetch all sports tabs
    const targetTabs =["NHL", "MLB", "NBA", "NFL", "MLS", "ESPN+", "TSN+", "SN+", "PARAMOUNT", "PEACOCK", "FLSP", "BTN+", "VICTORY+", "DAZN", "PPV UFC", "PPV EVENTS"];
    let loaded = 0;
    state.sheetData =[];
    
    targetTabs.forEach(tab => {
      fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`)
      .then(r=>r.text()).then(txt => {
        try {
          const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}')+1));
          json.table.rows.forEach(r => {
            if(r.c && r.c[0] && r.c[1] && r.c[0].v !== 'Channel #') {
              state.sheetData.push({
                tab: tab,
                channel: r.c[0].v,
                title: r.c[1].v,
                date: r.c[2] ? r.c[2].v : '',
                time: r.c[3] ? r.c[3].v.replace(/^'/, '') : '',
                region: determineRegion(r.c[0].v)
              });
            }
          });
        } catch(e){}
      }).finally(() => {
        loaded++;
        if(loaded === targetTabs.length) resolve();
      });
    });
  });
}

// ─── THESPORTSDB ───
function fetchTSDB() {
  return new Promise((resolve) => {
    const leagues =["NHL", "MLB", "NBA", "NFL", "MLS", "English Premier League", "Spanish La Liga", "UEFA Champions League", "Formula 1", "ATP World Tour"];
    let loaded = 0;
    state.tsdbData =[];
    
    leagues.forEach(l => {
      fetch(`https://www.thesportsdb.com/api/v1/json/${TSDB_KEY}/eventsday.php?d=${state.selectedDate}&l=${encodeURIComponent(l)}`)
      .then(r=>r.json()).then(data => {
        if(data.events) {
          data.events.forEach(e => {
            state.tsdbData.push({
              league: l,
              home: e.strHomeTeam,
              away: e.strAwayTeam,
              homeBadge: e.strHomeTeamBadge,
              awayBadge: e.strAwayTeamBadge,
              homeScore: e.intHomeScore,
              awayScore: e.intAwayScore,
              status: e.strStatus,
              timeLocal: e.strTimeLocal, // Using Local venue time
              venue: e.strVenue,
              thumb: e.strThumb
            });
          });
        }
      }).finally(() => {
        loaded++;
        if(loaded === leagues.length) resolve();
      });
    });
  });
}

// ============================================================================
// MERGING & RENDering
// ============================================================================
function determineRegion(channelStr) {
  const up = channelStr.toUpperCase();
  if (up.includes('CA ') || up.includes('TSN') || up.includes('SN+')) return 'CA';
  if (up.includes('UK ')) return 'UK';
  if (up.includes('AU ')) return 'AU';
  return 'US'; // Default ESPN, PARAMOUNT, etc
}

function timeToMins(tStr) {
  if(!tStr) return 9999;
  const m = tStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!m) return 9999;
  let h = parseInt(m[1]), min = parseInt(m[2]), ap = m[3].toUpperCase();
  if(ap === 'PM' && h < 12) h += 12;
  if(ap === 'AM' && h === 12) h = 0;
  return h*60 + min;
}

function formatTzTime(timeLocalStr) {
  // TSDB timeLocal is usually HH:MM:SS 24h venue time. Treat it as ET for simplicity in sports context.
  if(!timeLocalStr) return "TBD";
  const pts = timeLocalStr.split(':');
  let h = parseInt(pts[0]), m = pts[1];
  let ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ap} ET`;
}

function renderSchedule() {
  const container = document.getElementById('scheduleContent');
  const d = i18n[state.lang];
  
  // 1. Merge Data (Fuzzy matching team names)
  let mergedEvents =[];
  
  // Start with TSDB events
  state.tsdbData.forEach(te => {
    let matchFound = false;
    let assignedChannel = null;
    let assignedRegion = 'US';
    
    // Look for matching game in Sheet Data
    for(let i=0; i<state.sheetData.length; i++) {
      let se = state.sheetData[i];
      let sTitle = se.title.toLowerCase();
      // If away team or home team name is in the sheet title
      if(te.away && te.home && (sTitle.includes(te.away.toLowerCase().split(' ').pop()) || sTitle.includes(te.home.toLowerCase().split(' ').pop()))) {
        assignedChannel = se.channel;
        assignedRegion = se.region;
        matchFound = true;
        se.merged = true; // mark as used
        break;
      }
    }
    
    mergedEvents.push({
      isTSDB: true,
      league: te.league,
      away: te.away, home: te.home,
      awayBadge: te.awayBadge, homeBadge: te.homeBadge,
      awayScore: te.awayScore, homeScore: te.homeScore,
      status: te.status, venue: te.venue,
      timeStr: formatTzTime(te.timeLocal),
      sortMins: timeToMins(formatTzTime(te.timeLocal)),
      channel: assignedChannel,
      region: assignedRegion
    });
  });
  
  // Add remaining Sheet Data (Specialty channels without TSDB match)
  state.sheetData.forEach(se => {
    if(!se.merged) {
      mergedEvents.push({
        isTSDB: false,
        league: se.tab,
        title: se.title,
        timeStr: se.time,
        sortMins: timeToMins(se.time),
        channel: se.channel,
        region: se.region
      });
    }
  });
  
  // 2. Filter Data
  let filtered = mergedEvents.filter(ev => {
    // Region Filter
    if (state.region !== 'ALL' && ev.region !== state.region) return false;
    
    // Category Filter
    if (state.activeCat !== 'ALL') {
      const catDef = CATEGORIES.find(c => c.id === state.activeCat);
      const isMatch = catDef.tabs.includes(ev.league) || catDef.tsdb.includes(ev.league);
      if (!isMatch) return false;
    }
    
    // Search Filter
    if (state.search) {
      const text = (ev.title || (ev.away + " " + ev.home) || "").toLowerCase() + " " + (ev.channel || "").toLowerCase();
      if (!text.includes(state.search)) return false;
    }
    
    return true;
  });
  
  // Sort by time
  filtered.sort((a,b) => a.sortMins - b.sortMins);
  
  // Sort Favorites to top
  filtered.sort((a,b) => {
    let aFav = state.favTeams.includes(a.away) || state.favTeams.includes(a.home) ? -1 : 1;
    let bFav = state.favTeams.includes(b.away) || state.favTeams.includes(b.home) ? -1 : 1;
    return aFav - bFav;
  });

  // 3. Build HTML
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">${d.noEvents}</div>`;
    return;
  }
  
  let html = '';
  let currentLeague = '';
  
  filtered.forEach(ev => {
    if (ev.league !== currentLeague) {
      currentLeague = ev.league;
      html += `<div class="league-header">
                 <div class="league-name">${ev.league}</div>
                 <div class="league-line"></div>
               </div>`;
    }
    
    const isLive = ev.status && ev.status !== 'Not Started' && ev.status !== 'Match Finished' && ev.status !== 'FT';
    const isFinal = ev.status === 'Match Finished' || ev.status === 'FT';
    const statusText = isLive ? 'LIVE' : (isFinal ? 'FINAL' : ev.timeStr);
    const statusClass = isLive ? 'time-live' : '';
    
    let isFav = state.favTeams.includes(ev.away) || state.favTeams.includes(ev.home);
    let favIcon = isFav ? '★' : '☆';
    
    // Construct Card based on TSDB vs Sheet
    if (ev.isTSDB) {
      const chInfo = ev.channel 
        ? `<div class="stealth-channel">${d.watchOn} ${ev.channel}</div>` 
        : `<div class="provider-channel">${d.checkProv}</div>`;
        
      html += `
      <div class="card">
        <div class="card-top">
          <div class="${statusClass}">${statusText}</div>
          <div>${ev.venue || ''}</div>
        </div>
        <div class="matchup">
          <div class="team away">
            <span class="team-name">${ev.away}</span>
            ${ev.awayBadge ? `<img src="${ev.awayBadge}" class="team-logo">` : ''}
          </div>
          <div class="score-box">
            ${isLive || isFinal ? `<div class="score-text">${ev.awayScore} - ${ev.homeScore}</div>` : `<div class="vs-text">AT</div>`}
          </div>
          <div class="team home">
            ${ev.homeBadge ? `<img src="${ev.homeBadge}" class="team-logo">` : ''}
            <span class="team-name">${ev.home}</span>
          </div>
        </div>
        <div class="card-bottom">
          ${chInfo}
          <div class="star-btn ${isFav?'fav':''}" onclick="toggleFav('${ev.away}')">${favIcon}</div>
        </div>
      </div>`;
    } else {
      // Basic Sheet Card
      html += `
      <div class="card">
        <div class="card-top">
          <div>${ev.timeStr}</div>
        </div>
        <div class="matchup" style="justify-content: flex-start; gap: 15px;">
           <span class="team-name" style="font-size:16px;">${ev.title}</span>
        </div>
        <div class="card-bottom">
          <div class="stealth-channel">${d.watchOn} ${ev.channel}</div>
        </div>
      </div>`;
    }
  });
  
  container.innerHTML = html;
}

window.onload = init;
</script>
</body>
</html>
