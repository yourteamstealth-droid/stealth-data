<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STEALTH SPORTS PREMIUM</title>
<style>
:root {
  --primary:#135482; --primary-dark:#0c3859; --secondary:#1b6ca8;
  --accent:#e8000d; --bg:#f0f2f5; --card:#ffffff;
  --text:#1a1a1a; --muted:#6e767d; --border:#e1e4e8;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
button{cursor:pointer;border:none;background:none;}
input:focus,select:focus,textarea:focus{outline:none;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0c3859 0%,#135482 40%,#1b6ca8 70%,#0a0a0a 100%);display:flex;align-items:center;justify-content:center;padding:20px;}
.login-panel{width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:0;}
.login-logo-wrap{width:160px;height:160px;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.6);margin-bottom:24px;background:#000;}
.login-logo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.login-card{width:100%;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.12);border-top:3px solid var(--accent);border-radius:12px;padding:32px 28px;box-shadow:0 25px 50px rgba(0,0,0,0.5);}
.login-card h1{color:#fff;font-size:22px;font-weight:900;letter-spacing:2px;text-align:center;margin-bottom:8px;text-transform:uppercase;}
.login-card p{color:rgba(255,255,255,0.5);font-size:12px;text-align:center;margin-bottom:24px;letter-spacing:1px;text-transform:uppercase;}
.login-lang{display:flex;justify-content:center;gap:8px;margin-bottom:20px;}
.ll-btn{color:rgba(255,255,255,0.6);padding:4px 10px;border-radius:4px;font-size:12px;font-weight:700;border:1px solid rgba(255,255,255,0.2);transition:.2s;}
.ll-btn.active{color:#fff;background:var(--accent);border-color:var(--accent);}
.login-input{width:100%;padding:14px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;text-align:center;font-size:20px;letter-spacing:4px;margin-bottom:14px;transition:.3s;}
.login-input:focus{border-color:rgba(135,206,235,.6);box-shadow:0 0 0 3px rgba(135,206,235,.1);}
.login-input::placeholder{color:rgba(255,255,255,.3);font-size:13px;letter-spacing:1px;}
.login-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border-radius:8px;font-weight:800;font-size:14px;letter-spacing:2px;text-transform:uppercase;transition:.2s;box-shadow:0 4px 15px rgba(232,0,13,.4);}
.login-btn:hover{background:#cc000b;transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,0,13,.6);}
#loginErr{color:#ff6b6b;font-size:13px;font-weight:700;text-align:center;margin-top:12px;min-height:18px;}

/* APP */
#app{display:none;flex-direction:column;flex:1;}

/* HEADER */
.hdr{background:var(--primary);color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.15);}
.brand{display:flex;align-items:center;gap:12px;}
.brand-logo{height:36px;width:36px;border-radius:6px;object-fit:cover;background:#000;}
.brand-title{font-size:18px;font-weight:900;letter-spacing:.5px;}
.hdr-right{display:flex;align-items:center;gap:16px;}
.app-lang-btn{border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:700;transition:.2s;}
.clock-tz{display:flex;flex-direction:column;align-items:flex-end;}
#liveClock{font-size:13px;font-weight:800;}
.tz-sel{background:transparent;color:rgba(255,255,255,.7);border:none;font-size:10px;font-weight:600;cursor:pointer;margin-top:1px;}
.tz-sel option{color:var(--text);}
.logout-btn{font-size:18px;cursor:pointer;opacity:.8;transition:.2s;}
.logout-btn:hover{color:var(--accent);}

/* SEARCH */
.search-bar{background:var(--primary-dark);padding:10px 24px;display:flex;justify-content:center;}
.search-wrap{position:relative;width:100%;max-width:700px;}
.search-wrap input{width:100%;padding:10px 15px 10px 38px;border:none;border-radius:6px;font-size:14px;font-weight:500;color:var(--text);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}

/* TOP NAV */
.top-nav{background:var(--secondary);display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:4px solid var(--accent);padding:0 12px;}
.top-nav::-webkit-scrollbar{display:none;}
.nav-item{flex:0 0 auto;color:rgba(255,255,255,.7);padding:13px 18px;font-size:12px;font-weight:800;text-transform:uppercase;cursor:pointer;border-bottom:4px solid transparent;margin-bottom:-4px;transition:.2s;letter-spacing:.5px;white-space:nowrap;}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.08);}
.nav-item.active{color:#fff;border-bottom-color:#fff;}
.nav-sel{background:transparent;color:rgba(255,255,255,.7);border:none;font-size:12px;font-weight:800;text-transform:uppercase;padding:13px 18px;cursor:pointer;letter-spacing:.5px;}
.nav-sel option{color:var(--text);}

/* DATE SLIDER */
.date-row{background:var(--card);display:flex;overflow-x:auto;padding:14px 24px;gap:8px;border-bottom:1px solid var(--border);scrollbar-width:none;}
.date-row::-webkit-scrollbar{display:none;}
.date-box{flex:0 0 auto;min-width:68px;text-align:center;padding:10px 6px;border-radius:6px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:var(--bg);transition:.2s;}
.date-box:hover{border-color:#bbb;}
.date-box.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 10px rgba(19,84,130,.3);transform:translateY(-1px);}
.d-day{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.d-num{font-size:18px;font-weight:900;}

/* CONTAINER */
.container{max-width:1100px;margin:0 auto;width:100%;padding:20px;flex:1;display:flex;flex-direction:column;gap:18px;}

/* BILLBOARD */
.billboard{background:var(--card);border:1px solid var(--border);border-left:5px solid var(--accent);border-radius:8px;padding:20px 24px;display:none;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.bb-label{font-size:11px;color:var(--accent);font-weight:900;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.bb-msg{font-size:15px;font-weight:600;color:var(--text);line-height:1.5;}
.bb-btn{background:var(--primary);color:#fff;padding:10px 20px;border-radius:20px;font-weight:700;font-size:13px;white-space:nowrap;transition:.2s;}
.bb-btn:hover{background:var(--secondary);}

/* SUB MENUS */
.sub-menus{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.04);}
.sm-tabs{display:flex;border-bottom:1px solid var(--border);background:#fafbfc;overflow-x:auto;scrollbar-width:none;}
.sm-tabs::-webkit-scrollbar{display:none;}
.sm-tab{padding:13px 22px;font-size:13px;font-weight:800;color:var(--muted);text-transform:uppercase;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s;letter-spacing:.5px;}
.sm-tab:hover{color:var(--primary);}
.sm-tab.active{color:var(--primary);border-bottom-color:var(--primary);background:#fff;}
.sm-mid{display:flex;justify-content:space-between;align-items:center;padding:13px 22px;border-bottom:1px solid var(--border);}
.sm-title{font-size:14px;font-weight:800;color:var(--text);}
.edit-btn{background:var(--bg);border:1px solid #ccc;padding:6px 12px;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;text-transform:uppercase;}
.edit-btn:hover{background:#e8eaec;}
.sm-bot{display:flex;align-items:center;gap:12px;padding:12px 22px;background:#fafbfc;overflow-x:auto;scrollbar-width:none;}
.sm-bot::-webkit-scrollbar{display:none;}
.f-btn{background:#fff;border:1px solid #ccc;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;white-space:nowrap;text-transform:uppercase;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.f-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.reg-sel{background:#fff;border:1px solid #ccc;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;color:var(--text);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05);}

/* SCHEDULE */
.status-msg{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;font-weight:700;}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}

.league-group{margin-bottom:20px;}
.league-hdr{display:flex;align-items:center;gap:12px;padding:0 6px 10px;font-size:14px;font-weight:900;color:var(--primary-dark);text-transform:uppercase;letter-spacing:1px;}
.league-line{flex:1;height:2px;background:linear-gradient(to right,var(--border),transparent);}

.card{background:var(--card);border:1px solid var(--border);border-radius:8px;display:flex;align-items:stretch;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:.2s;overflow:hidden;}
.card:hover{border-color:#bbb;box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px);}

.c-time{width:110px;background:#fafbfc;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:14px 8px;flex-shrink:0;}
.time-val{background:#fff;border:1px solid #ddd;border-radius:5px;padding:6px 4px;font-size:12px;font-weight:900;color:var(--text);text-align:center;width:100%;line-height:1.2;}
.time-val.live{background:var(--accent);border-color:var(--accent);color:#fff;animation:pls 2s infinite;}
@keyframes pls{0%,100%{opacity:1;}50%{opacity:.5;}}
.time-stat{font-size:10px;font-weight:700;color:var(--muted);margin-top:5px;text-align:center;text-transform:uppercase;}

.c-match{flex:1;padding:14px 20px;display:flex;flex-direction:column;justify-content:center;}
.matchup{display:flex;align-items:center;gap:12px;}
.tw{display:flex;align-items:center;gap:10px;flex:1;}
.tw.away{justify-content:flex-end;}
.t-logo{width:28px;height:28px;object-fit:contain;}
.t-name{font-size:15px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sb{padding:0 12px;text-align:center;min-width:72px;display:flex;align-items:center;justify-content:center;}
.sc{font-size:20px;font-weight:900;color:var(--primary);letter-spacing:2px;}
.vs{font-size:13px;font-weight:700;color:#999;}
.venue{font-size:11px;color:var(--muted);font-weight:600;margin-top:7px;display:flex;align-items:center;gap:5px;}

.c-chans{padding:14px 18px;border-left:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:8px;min-width:200px;background:#fdfdfd;}
.b-stealth{background:var(--accent);color:#fff;padding:7px 12px;border-radius:5px;font-size:11px;font-weight:900;text-transform:uppercase;text-align:center;width:100%;box-shadow:0 2px 6px rgba(232,0,13,.25);}
.b-prov{border:1px solid #ddd;color:var(--muted);padding:5px 10px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;text-align:center;width:100%;background:#fff;}
.b-box{background:var(--primary);color:#fff;padding:7px 12px;border-radius:5px;font-size:11px;font-weight:900;width:100%;text-align:center;transition:.2s;text-transform:uppercase;display:block;}
.b-box:hover{background:var(--primary-dark);}

/* MODAL */
#modalOvl{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--card);width:100%;max-width:460px;border-radius:10px;overflow:hidden;box-shadow:0 15px 50px rgba(0,0,0,.3);}
.m-hdr{background:var(--primary);color:#fff;padding:16px 22px;font-weight:900;font-size:15px;display:flex;justify-content:space-between;align-items:center;text-transform:uppercase;letter-spacing:.5px;}
.m-x{cursor:pointer;font-size:22px;transition:.2s;}
.m-x:hover{color:var(--accent);}
.m-body{padding:20px;max-height:55vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.m-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#f7f8f9;border-radius:6px;border:1px solid #eee;}
.m-row label{font-size:13px;font-weight:700;cursor:pointer;flex:1;color:var(--text);}
.m-row input{width:17px;height:17px;cursor:pointer;accent-color:var(--primary);}
.m-foot{padding:14px 22px;background:#f7f8f9;border-top:1px solid var(--border);text-align:right;}
.m-save{background:var(--primary);color:#fff;padding:9px 22px;border-radius:5px;font-weight:800;font-size:13px;text-transform:uppercase;transition:.2s;}
.m-save:hover{background:var(--primary-dark);}

/* RESPONSIVE */
@media(max-width:800px){
  .card{flex-direction:column;}
  .c-time{width:100%;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;justify-content:space-between;padding:10px 18px;}
  .time-val{width:auto;padding:5px 10px;}
  .time-stat{margin-top:0;}
  .c-match{padding:14px 18px;}
  .matchup{flex-direction:column;align-items:flex-start;gap:8px;}
  .tw{width:100%;justify-content:flex-start!important;}
  .sb{padding:0;min-width:auto;margin-left:36px;}
  .c-chans{border-left:none;border-top:1px solid var(--border);flex-direction:row;flex-wrap:wrap;justify-content:flex-start;padding:12px 18px;}
  .b-stealth,.b-prov,.b-box{width:auto;flex:1 1 auto;}
  .m-body{grid-template-columns:1fr;}
}
</style>
</head>

  auth:sessionStorage.getItem('sa')==='1',
  tz:localStorage.getItem('stz')||Intl.DateTimeFormat().resolvedOptions().timeZone,
  cat:'ALL',view:'guide',sub:'ALL',search:'',
  dateStr:'',dateObj:new Date(),
  rawSh:[],rawTs:[],
  myLgs:JSON.parse(localStorage.getItem('sml')||'[]')
};

/* AUTH */
function doLogin(){
  if(document.getElementById('accessCode').value===PASS){
    sessionStorage.setItem('sa','1');S.auth=true;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    fetchAnn();fetchData();
  }else{document.getElementById('loginErr').textContent=T[S.lang].err;}
}
function doLogout(){sessionStorage.removeItem('sa');location.reload();}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&!S.auth)doLogin();});

/* LANGUAGE */
function setLang(l){
  S.lang=l;localStorage.setItem('sl',l);
  document.getElementById('ll-en').className='ll-btn'+(l==='en'?' active':'');
  document.getElementById('ll-fr').className='ll-btn'+(l==='fr'?' active':'');
  applyUI();if(S.auth){buildNav();buildDates();fetchAnn();render();}
}
function toggleLang(){setLang(S.lang==='en'?'fr':'en');}

function applyUI(){
  const d=T[S.lang];
  document.getElementById('appLangBtn').textContent=S.lang==='en'?'FR':'EN';
  document.getElementById('l-title').textContent=d.logHead;
  document.getElementById('l-sub').textContent=d.logSub;
  document.getElementById('l-btn').textContent=d.logBtn;
  document.getElementById('accessCode').placeholder=d.search;
  document.getElementById('bb-label').textContent=d.ann;
  document.getElementById('tab-guide').textContent=d.guide;
  document.getElementById('tab-results').textContent=d.results;
  document.getElementById('tab-leagues').textContent=d.leagues;
  document.getElementById('tab-teams').textContent=d.teams;
  document.getElementById('tab-upcoming').textContent=d.upcoming;
  document.getElementById('sm-title').textContent=d.myLgs;
  document.getElementById('f-all').textContent=d.allFil;
  document.getElementById('f-my').textContent=d.myFil;
  document.getElementById('edit-lbl').textContent=d.editLbl;
  document.getElementById('m-title').textContent=d.modTitle;
  document.getElementById('m-save').textContent=d.saveLbl;
  document.getElementById('searchBox').placeholder=d.search;
}

/* TIMEZONE */
function buildTZ(){
  const s=document.getElementById('tzSel');
  const local=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const z=[
    {v:local,l:"Local Time"},
    {v:"America/New_York",l:"Montréal / New York (ET)"},
    {v:"America/Chicago",l:"Chicago (CT)"},
    {v:"America/Denver",l:"Calgary / Denver (MT)"},
    {v:"America/Phoenix",l:"Phoenix (MST)"},
    {v:"America/Los_Angeles",l:"Vancouver / LA (PT)"},
    {v:"America/Halifax",l:"Halifax (AT)"},
    {v:"Europe/London",l:"London (UK)"},
    {v:"Europe/Paris",l:"Paris (FR)"},
    {v:"Australia/Sydney",l:"Sydney (AU)"},
    {v:"Pacific/Auckland",l:"New Zealand"}
  ];
  let seen=new Set(),html='';
  z.forEach(x=>{if(!seen.has(x.v)){seen.add(x.v);html+=`<option value="${x.v}"${x.v===S.tz?' selected':''}>${x.l}</option>`;}});
  s.innerHTML=html;
}
function startClock(){setInterval(()=>{document.getElementById('liveClock').textContent=new Intl.DateTimeFormat('en-US',{timeStyle:'medium',timeZone:S.tz}).format(new Date());},1000);}
function changeTz(){S.tz=document.getElementById('tzSel').value;localStorage.setItem('stz',S.tz);calcDate();buildDates();fetchData();}

function calcDate(){
  const p=new Intl.DateTimeFormat('en-US',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:S.tz}).formatToParts(new Date());
  S.dateStr=`${p.find(x=>x.type==='year').value}-${p.find(x=>x.type==='month').value}-${p.find(x=>x.type==='day').value}`;
  S.dateObj=new Date(`${S.dateStr}T12:00:00`);
}

function toLocal(utcDate,utcTime){
  if(!utcTime)return{str:"TBD",ms:Infinity,ok:true};
  try{
    let d=new Date(`${utcDate}T${utcTime}Z`);
    let str=new Intl.DateTimeFormat('en-US',{weekday:'short',hour:'numeric',minute:'2-digit',timeZoneName:'short',timeZone:S.tz}).format(d);
    const p=new Intl.DateTimeFormat('en-US',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:S.tz}).formatToParts(d);
    let ok=`${p.find(x=>x.type==='year').value}-${p.find(x=>x.type==='month').value}-${p.find(x=>x.type==='day').value}`===S.dateStr;
    return{str,ms:d.getTime(),ok};
  }catch(e){return{str:utcTime,ms:Infinity,ok:true};}
}

function etToLocal(raw){
  if(!raw||raw==='N/A')return{str:"TBD",ms:Infinity};
  try{
    let m=raw.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if(!m)return{str:raw,ms:Infinity};
    let h=parseInt(m[1]),min=parseInt(m[2]),ap=m[3].toUpperCase();
    if(ap==='PM'&&h<12)h+=12;if(ap==='AM'&&h===12)h=0;
    let d=new Date(`${S.dateStr}T${('0'+h).slice(-2)}:${('0'+min).slice(-2)}:00-04:00`);
    let str=new Intl.DateTimeFormat('en-US',{weekday:'short',hour:'numeric',minute:'2-digit',timeZoneName:'short',timeZone:S.tz}).format(d);
    return{str,ms:d.getTime()};
  }catch(e){return{str:raw,ms:Infinity};}
}

/* NAVIGATION */
function buildNav(){
  const d=T[S.lang];
  let h=NAV.map(c=>`<div class="nav-item${S.cat===c.id?' active':''}" onclick="setCat('${c.id}')">${c[S.lang]}</div>`).join('');
  h+=`<select class="nav-sel" onchange="setCat(this.value)"><option value="" disabled selected hidden>${d.oth}</option>`;
  OTH.forEach(c=>{h+=`<option value="${c.id}">${c[S.lang]}</option>`;});
  h+=`</select>`;
  document.getElementById('topNav').innerHTML=h;
}
function setCat(id){S.cat=id;buildNav();render();}

function setView(v){
  S.view=v;
  ['guide','results'].forEach(x=>{document.getElementById('tab-'+x).className='sm-tab'+(x===v?' active':'');});
  render();
}
function setSub(id){
  S.sub=id;
  document.getElementById('f-all').className='f-btn'+(id==='ALL'?' active':'');
  document.getElementById('f-my').className='f-btn'+(id==='MY'?' active':'');
  render();
}

function buildDates(){
  const d=T[S.lang];
  let h='',base=new Date();
  for(let i=0;i<7;i++){
    let day=new Date(base);day.setDate(base.getDate()+i);
    let ds=day.getFullYear()+'-'+('0'+(day.getMonth()+1)).slice(-2)+'-'+('0'+day.getDate()).slice(-2);
    let name=i===0?d.today:day.toLocaleDateString(S.lang==='fr'?'fr-CA':'en-CA',{weekday:'short'});
    h+=`<div class="date-box${S.dateStr===ds?' active':''}" onclick="pickDate('${ds}')"><div class="d-day">${name}</div><div class="d-num">${day.getDate()}</div></div>`;
  }
  document.getElementById('dateRow').innerHTML=h;
}
function pickDate(ds){S.dateStr=ds;S.dateObj=new Date(`${ds}T12:00:00`);if(S.view==='results')setView('guide');buildDates();fetchData();}

/* MODAL */
function openModal(){
  let h='';
  LGS.forEach(lg=>{let c=S.myLgs.includes(lg)?'checked':'';h+=`<div class="m-row"><label for="cb-${lg}">${lg}</label><input type="checkbox" id="cb-${lg}" value="${lg}" ${c}></div>`;});
  document.getElementById('m-body').innerHTML=h;
  document.getElementById('modalOvl').style.display='flex';
}
function closeModal(){document.getElementById('modalOvl').style.display='none';}
function saveModal(){
  S.myLgs=[];LGS.forEach(lg=>{if(document.getElementById('cb-'+lg)?.checked)S.myLgs.push(lg);});
  localStorage.setItem('sml',JSON.stringify(S.myLgs));closeModal();render();
}

/* FUZZY MATCH */
function fuzzy(title,away,home){
  if(!title||!away||!home)return false;
  let s=title.toLowerCase();
  let a=away.toLowerCase().split(' ').filter(w=>w.length>2);
  let h=home.toLowerCase().split(' ').filter(w=>w.length>2);
  return a.some(w=>s.includes(w))&&h.some(w=>s.includes(w));
}

/* REGION */
function reg(ch){
  const c=ch.toUpperCase();
  if(c.includes('CA ')||c.includes('TSN')||c.includes('SN+')||c.includes('CBC'))return'CA';
  if(c.includes('UK '))return'UK';
  if(c.includes('AU '))return'AU';
  if(c.includes('FR '))return'FR';
  return'US';
}

/* DATA */
function fetchAnn(){
  fetch(`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:json&sheet=ANNOUNCEMENTS`)
  .then(r=>r.text()).then(txt=>{
    try{
      const j=JSON.parse(txt.substring(txt.indexOf('{'),txt.lastIndexOf('}')+1));
      const row=j.table.rows[0];
      if(row){
        const en=row.c[0]?.v||'',url=row.c[1]?.v||'',benE=row.c[2]?.v||'LINK',fr=row.c[3]?.v||en,benF=row.c[4]?.v||benE;
        if(en){
          const b=document.getElementById('billboard'),m=document.getElementById('bb-msg'),a=document.getElementById('bb-link');
          b.style.display='flex';m.textContent=S.lang==='fr'?fr:en;
          if(url){a.style.display='inline-block';a.href=url;a.textContent=S.lang==='fr'?benF:benE;}
        }
      }
    }catch(e){}
  });
}

function fetchData(){
  document.getElementById('sched').innerHTML=`<div class="status-msg"><div class="spinner"></div><br><br>${T[S.lang].loading}</div>`;
  Promise.all([loadSheet(),loadTSDB()]).then(()=>render());
}

function loadSheet(){
  return new Promise(resolve=>{
    const p=new Intl.DateTimeFormat('en-US',{year:'numeric',month:'2-digit',day:'2-digit',timeZone:S.tz}).formatToParts(new Date());
    const today=`${p.find(x=>x.type==='year').value}-${p.find(x=>x.type==='month').value}-${p.find(x=>x.type==='day').value}`;
    if(S.dateStr!==today){S.rawSh=[];return resolve();}
    const tabs=["NHL","MLB","NBA","NFL","MLS","ESPN+","TSN+","SN+","PARAMOUNT","PEACOCK","FLSP","BTN+","VICTORY+","DAZN","PPV UFC","PPV BOXING","PPV EVENTS","PPV NETFLIX","CBC PPV"];
    let done=0;S.rawSh=[];
    tabs.forEach(tab=>{
      fetch(`https://docs.google.com/spreadsheets/d/${SHEET}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`)
      .then(r=>r.text()).then(txt=>{
        try{
          const j=JSON.parse(txt.substring(txt.indexOf('{'),txt.lastIndexOf('}')+1));
          j.table.rows.forEach(r=>{
            if(r.c&&r.c[0]&&r.c[0].v!=='Channel #')
              S.rawSh.push({lg:tab,ch:r.c[0].v,ti:r.c[1].v,rawTm:r.c[3]?.v?.replace(/^'/,''),rg:reg(r.c[0].v)});
          });
        }catch(e){}
      }).finally(()=>{done++;if(done===tabs.length)resolve();});
    });
  });
}

function loadTSDB(){
  return new Promise(resolve=>{
    let d2=new Date(S.dateObj);d2.setDate(d2.getDate()+1);
    let s2=d2.getFullYear()+'-'+('0'+(d2.getMonth()+1)).slice(-2)+'-'+('0'+d2.getDate()).slice(-2);
    const lgs=["NHL","MLB","NBA","NFL","MLS","English Premier League","Spanish La Liga","UEFA Champions League","Formula 1","ATP World Tour","PGA Tour"];
    let done=0;S.rawTs=[];const total=lgs.length*2;
    lgs.forEach(l=>[S.dateStr,s2].forEach(d=>{
      fetch(`https://www.thesportsdb.com/api/v1/json/${TSDB}/eventsday.php?d=${d}&l=${encodeURIComponent(l)}`)
      .then(r=>r.json()).then(data=>{
        if(data.events)data.events.forEach(e=>{
          S.rawTs.push({lg:l,a:e.strAwayTeam,h:e.strHomeTeam,aB:e.strAwayTeamBadge,hB:e.strHomeTeamBadge,aS:e.intAwayScore,hS:e.intHomeScore,stat:e.strStatus,uD:e.dateEvent,uT:e.strTime,vn:e.strVenue});
        });
      }).finally(()=>{done++;if(done===total)resolve();});
    }));
  });
}

/* RENDER */
function render(){
  const sc=document.getElementById('sched'),d=T[S.lang];
  let merged=[],seen=new Set();

  S.rawTs.forEach(te=>{
    let uid=te.lg+te.a+te.h+te.uD;if(seen.has(uid))return;seen.add(uid);
    let t=toLocal(te.uD,te.uT);if(!t.ok)return;
    let fin=te.stat==='Match Finished'||te.stat==='FT';
    if(S.view==='guide'&&fin)return;
    if(S.view==='results'&&!fin)return;
    let mCh=null,mRg='US';
    S.rawSh.forEach(se=>{
      let v=false;
      if(te.lg==='NHL'&&['NHL','ESPN+','SN+','TSN+','FLSP'].includes(se.lg))v=true;
      if(te.lg==='MLB'&&['MLB','ESPN+'].includes(se.lg))v=true;
      if(te.lg==='NBA'&&['NBA','ESPN+','TSN+'].includes(se.lg))v=true;
      if(te.lg==='NFL'&&['NFL','ESPN+','TSN+','DAZN'].includes(se.lg))v=true;
      if(te.lg==='MLS'&&['MLS','ESPN+','TSN+'].includes(se.lg))v=true;
      if(v&&fuzzy(se.ti,te.a,te.h)){mCh=se.ch;mRg=se.rg;se.used=true;}
    });
    merged.push({ts:true,lg:te.lg,a:te.a,h:te.h,aB:te.aB,hB:te.hB,aS:te.aS,hS:te.hS,stat:te.stat,tStr:t.str,ms:t.ms,ch:mCh,rg:mRg,fin,vn:te.vn});
  });

  S.rawSh.forEach(se=>{
    if(se.used||S.view==='results')return;
    let t=etToLocal(se.rawTm);
    merged.push({ts:false,lg:se.lg,ti:se.ti,tStr:t.str,ms:t.ms,ch:se.ch,rg:se.rg,fin:false});
  });

  const rF=document.getElementById('regSel').value;
  let fil=merged.filter(ev=>{
    if(rF!=='ALL'&&ev.rg!==rF)return false;
    if(S.sub==='MY'&&!S.myLgs.includes(ev.lg))return false;
    if(S.cat!=='ALL'){
      let c=NAV.find(x=>x.id===S.cat)||OTH.find(x=>x.id===S.cat);
      if(c&&!c.ls.includes(ev.lg))return false;
    }
    if(S.search){
      let txt=(ev.ti||(ev.a+' '+ev.h)).toLowerCase()+(ev.ch||'').toLowerCase();
      if(!txt.includes(S.search))return false;
    }
    return true;
  });
  fil.sort((x,y)=>x.ms-y.ms);

  if(!fil.length){sc.innerHTML=`<div class="status-msg">${d.noEvents}</div>`;return;}

  let html='',curLg='';
  fil.forEach(ev=>{
    if(ev.lg!==curLg){
      if(curLg)html+='</div>';
      curLg=ev.lg;
      html+=`<div class="league-group"><div class="league-hdr">${ev.lg}<div class="league-line"></div></div>`;
    }
    let live=ev.stat&&!['Not Started','NS'].includes(ev.stat)&&!ev.fin;
    let tCls=live?'time-val live':'time-val';
    let tTxt=live?'LIVE':ev.tStr;
    let mHtml='';
    if(ev.ts){
      let aS=ev.aS!==null?ev.aS:'0',hS=ev.hS!==null?ev.hS:'0';
      let sc=(live||ev.fin)?`<div class="sb"><div class="sc">${aS} - ${hS}</div></div>`:`<div class="sb"><div class="vs">${d.at}</div></div>`;
      let aL=ev.aB?`<img src="${ev.aB}" class="t-logo">`:' ';
      let hL=ev.hB?`<img src="${ev.hB}" class="t-logo">`:' ';
      mHtml=`<div class="tw away"><span class="t-name">${ev.a}</span>${aL}</div>${sc}<div class="tw">${hL}<span class="t-name">${ev.h}</span></div>`;
    }else{
      let s=S.search?ev.ti.replace(new RegExp('('+S.search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span style="background:var(--accent);color:#fff;padding:0 2px;border-radius:2px;">$1</span>'):ev.ti;
      mHtml=`<div class="tw" style="justify-content:center;"><span class="t-name">${s}</span></div>`;
    }
    let cHtml='';
    if(ev.fin&&ev.ts){
      let q=encodeURIComponent(`box score ${ev.a} vs ${ev.h}`);
      cHtml=`<a href="https://www.google.com/search?q=${q}" target="_blank" class="b-box">📊 ${d.box}</a>`;
    }else if(ev.ch){
      cHtml=`<div class="b-stealth">📺 ${d.watch} ${ev.ch}</div>`;
    }else if(ev.ts){
      cHtml=`<div class="b-prov">${d.prov} ${BRD[ev.lg]||'Check Local Listings'}</div>`;
    }
    html+=`<div class="card"><div class="c-time"><div class="${tCls}">${tTxt}</div><div class="time-stat">${live?ev.stat:''}</div></div><div class="c-match"><div class="matchup">${mHtml}</div>${ev.vn?`<div class="venue">📍 ${ev.vn}</div>`:''}</div><div class="c-chans">${cHtml}</div></div>`;
  });
  if(curLg)html+='</div>';
  sc.innerHTML=html;
}

/* BOOT */
function boot(){
  applyUI();buildTZ();startClock();calcDate();buildNav();buildDates();
  if(S.auth){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    fetchAnn();fetchData();
  }
  document.getElementById('searchBox').addEventListener('input',e=>{S.search=e.target.value.toLowerCase();render();});
}
setInterval(()=>{if(S.auth)fetchData();},300000);
window.onload=boot;
</script>
